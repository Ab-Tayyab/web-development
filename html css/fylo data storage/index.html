<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fylo data storage</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="shortcut icon"
      href="./icon/favicon-32x32.png"
      type="image/x-icon"
    />
  </head>
  <body>
    <img class="mb1" src="./icon/bg-desktop.png" alt="">
    <img class="mb2" src="./icon/bg-mobile.png" alt="image">
    <div class="container">
      <div class="overview">
        <img src="./icon/logo.svg" alt="logo" />
        <div>
          <img src="./icon/icon-document.svg" alt="document" />
          <img src="./icon/icon-folder.svg" alt="folder" />
          <img src="./icon/icon-upload.svg" alt="upload" />
        </div>
      </div>
      <div class="card">
        <div class="tooltip"><strong>185</strong> GB LEFT</div>

        <p>You've used <strong>815 GB</strong> of your storage</p>

        <div class="progress-bar">
          <div class="progress">
            <span class="dot"></span>
          </div>
        </div>

        <div class="labels">
          <span>0 GB</span>
          <span>1000 GB</span>
        </div>
      </div>
    </div>
  </body>
</html>
