<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order Summary</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="shortcut icon" href="./icon/favicon-32x32.png" type="image/x-icon">
  </head>
  <body >
    <!-- <body> -->
    <div class="container">
      <img src="./icon/illustration-hero.svg" alt="hero image" />
      <div>
        <h1>Order Summary</h1>
        <p>
          You can now listen to millions of songs, audiobook and podcast on any
          device anywhere you like!
        </p>
        <div class="plans">
          <div>
            <img src="./icon/icon-music.svg" alt="music icon" />
            <div>
              <h2>Annual Plan</h2>
              <h3>$199.9</h3>
            </div>
          </div>
          <a href=""><h4>Change</h4></a>

        <button class="cancel">Cancel Order</button>
      </div>
    </div>
