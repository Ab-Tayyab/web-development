<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT card Preview</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="./icon/favicon-32x32.png" type="image/x-icon">
</head>
<body>
    <div class="container">
        <img src="./icon/image-equilibrium.jpg" alt="NFT logo">
        <h1>Equilibrium #2343</h1>
        <p>Our Equilibrium collection promotes balance and calm.</p>
        <div class="price">
            <span class="price-sp">
                <img src="./icon/icon-ethereum.svg" alt="ethereum icon">
                0.04 ETH</span>
            <span class="price-rem">
                <img src="./icon//icon-clock.svg" alt="clock icon">
                3 Days Left</span>
        </div>
        <hr>
        <div class="profile">
            <img src="./icon//image-avatar.png" alt="Display Image">
            <h2>Creation of <span>AB</span></h2>
        </div>
    </div>
    
</body>
</html>
