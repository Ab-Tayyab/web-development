<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Preview Card</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <link
      rel="shortcut icon"
      href="./icon/favicon-32x32.png"
      type="image/x-icon"
    />
  </head>
  <body>
    <div class="container">
      <div class="left-card">
        <picture>
          <!-- Mobile image: shown for screens 768px and smaller -->
          <source srcset="./icon/image-product-mobile.jpg" media="(max-width: 768px)" />
          <!-- Desktop image: default for larger screens -->
          <img src="./icon/image-product-desktop.jpg" alt="Description of image" />
        </picture>
      </div>
      <div class="right-card">
        <h2>PERFUME</h2>
        <h1>Gabrielle Essence Eau De Parfum</h1>
        <p>
          A floral, solar and voluptuous interpretation composed by Olivier
          Polge, Perfumer=Creater For the House of CHANEL
        </p>
        <div class="price">
          <span class="p1">$149.99</span>
          <span class="p2">$169.99</span>
        </div>
        <button>
          <i class="fa fa-shopping-cart"></i>
          Add To Cart
        </button>
      </div>
    </div>
  </body>
</html>
