<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Card</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="shortcut icon"
      href="./icon/favicon-32x32.png"
      type="image/x-icon"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Karla:ital,wght@0,200..800;1,200..800&family=Kumbh+Sans:wght,YOPQ@100..900,300&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <img class="bg1" src="./icon/bg-pattern-top.svg" alt="">
    <img class="bg2" src="./icon/bg-pattern-bottom.svg" alt="">
    <div class="container">
      <div class="child1">
        <img class="img1" src="./icon/bg-pattern-card.svg" alt="bg pattern" />
        <img class="img2" src="./icon/image-victor.jpg" alt="p-image " />
      </div>
      <div class="child2">
        <h1>Vector Crest <span>26</span></h1>
        <p>London</p>
      </div>
      <div class="child3">
        <div>
          <h1>80K</h1>
          <h2>Followers</h2>
        </div>
        <div>
          <h1>803K</h1>
          <h2>Likes</h2>
        </div>
        <div>
          <h1>1.4K</h1>
          <h2>Photos</h2>
        </div>
      </div>
    </div>
  </body>
</html>
