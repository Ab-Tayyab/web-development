<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Result summary component</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="shortcut icon" href="./icon/favicon-32x32.png" type="image/x-icon">
  </head>
  <body>
    <div class="container">
      <div class="container-child1">
        <h2>Your Result</h2>
        <div>
          <h1>76</h1>
          <p>of 100</p>
        </div>
        <h1>Great</h1>
        <p>
          Your scored higher then 65% of the people who have taken these tests.
        </p>
      </div>
      <div class="container-child2">
        <h1>Summary</h1>
          <div class="subject1">
            <div>
              <img src="./icon/icon-reaction.svg" alt="reaction icon">
              <h2>Reaction</h2>
            </div>
            <h3>80 / <span>100</span></h3>
          </div>
          <div class="subject2">
            <div>
              <img src="./icon/icon-memory.svg" alt="memory icon">
              <h2>Memory</h2>
            </div>
            <h3>92 / <span>100</span></h3>
          </div>
          <div class="subject3">
            <div>
              <img src="./icon/icon-verbal.svg" alt="verbal icon">
              <h2>Verbal</h2>
            </div>
            <h3>61 / <span>100</span></h3>
          </div>
          <div class="subject4">
            <div>
              <img src="./icon/icon-visual.svg" alt="memory icon">
              <h2>Visual</h2>
            </div>
            <h3>73 / <span>100</span></h3>
          </div>
          <button>Continue</button>
        </div>
      </div>
    </div>
  </body>
</html>
